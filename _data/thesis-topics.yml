- title: "Build a 3D point cloud map and use it for localization"
  description: "One quite often used localization method for autonomous cars is matching the ego vehicle’s current lidar scan with the existing point cloud map. Usually, these point cloud maps are done using specialized mapping cars equipped with lidar sensor(s) and expensive GNSS equipment capable of RTK GNSS localization. This usually provides good accuracy, but is expensive, requires good conditions for mapping, and needs heavy processing (removing dynamic obstacles, loop closure, SLAM techniques). One way to construct the 3D point cloud map would be to use images and perform Structure from Motion. The aim of this topic is to investigate the creation of these point clouds and their suitability for an image or lidar-based localization. This topic can also be divided into different parts: mapping stage - 3D point cloud map generation; localization part (lidar or camera-based)."
