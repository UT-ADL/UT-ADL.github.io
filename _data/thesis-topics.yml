- title: Systematic literature review theses
  description: "It is possible to take up conducting a systematic literature review, within the area of autonomous driving, as your thesis topic. The review process involves finding, reading, and analysing research articles, and then synthesising a review on a particular topic. The topics available for conducting the reviews are as follows: Systematic literature review on pedestrian motion prediction methods for real-time use in autonomous driving (Naveed Muhammad, Dmytro Zabolotnii); Systematic literature review on detection of anomalous pedestrian behaviour in autonomous driving (Naveed Muhammad, Dmytro Zabolotnii); Systematic literature review on identifying traffic priority sengements on roads, for applications in autonomous driving (Naveed Muhammad, Mahir Gulzar); Systematic literature review of openly available datasets in autonomous driving  (Naveed Muhammad, Debasis Kumar)."
