- title: "Train end-to-end model on all of the world's data"
  description: "Data is the most critical component in training highly performant neural networks. Autonomous Driving Lab with just one car is not able to collect enough data required to train the highest quality models. Therefore we want to make use of all the public data in the world. Your task in this project is to look up all potential sources for the data, convert them to common format and train one big end-to-end driving model on this dataset."
  type: Learned driving
  availability:
