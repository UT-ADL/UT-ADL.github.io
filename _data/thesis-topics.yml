- title: Review and comparison of non-supervised machine learning solutions and/or non-machine learning solutions for the task of pedestrian motion prediction
  description: You will investigate and create a list of selected non-supervised or non-machine learning solutions with similar evaluation metrics. Later, you will be able to re-implement (or use an open-source implementation) and compare them experimentally with the known supervised learning state-of-art solutions, using Autonomous Driving simulator compliant with the Autoware platform or the historical trips data obtained by our vehicle with autonomous driving capabilities. A practical result will be the survey article on the state of the research in the area with experimental results obtained using real-life driving data.
