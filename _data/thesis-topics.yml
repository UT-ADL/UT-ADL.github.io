- title: "Deep Reinforcement Learning for Order Dispatching in Ridehailing"
  description: "Finding the best driver for every order is one of the most crucial problems in ridehailing. However, real-life constraints make it almost impossible to solve this problem to optimality. One has to consider reliability and latency requirements as well as multiple business objectives when finding the optimal dispatching policy. In this project you will implement various deep learning architectures and evaluate their performance for multiobjective dispatching optimization task."
  type: Bolt
  availability:
    BSc: no
    MSc: yes
    PhD: no
  leads:
