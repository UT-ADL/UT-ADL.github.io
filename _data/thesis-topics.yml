- title: Review and comparison of non-supervised machine learning solutions and/or non-machine learning solutions for the task of pedestrian motion prediction
  description: As human drivers, we instinctively predict the motion of other road agents, be it manually driven vehicles, pedestrians and cyclists, etc. This, however, is not a trivial task for an autonomous vehicle. There was a surge of state-of-art supervised machine learning solutions using advanced neural network architectures in recent years. The proposed solutions show promising results in the offline dynamic objects prediction competitions (i.e., Nuscenes Prediction <a href='https://www.nuscenes.org/prediction' target='_blank'>https://www.nuscenes.org/prediction</a>), however, they create implicit dependency on having an extensive and diverse training dataset and often ignore practical realities of running the proposed solution on a potentially real autonomous driving vehicle. You will investigate and create a list of selected non-supervised or non-machine learning solutions with similar evaluation metrics. Later, you will be able to re-implement (or use an open-source implementation) and compare them experimentally with the known supervised learning state-of-art solutions, using Autonomous Driving simulator compliant with the Autoware platform or the historical trips data obtained by our vehicle with autonomous driving capabilities. A practical result will be the survey article on the state of the research in the area with experimental results obtained using real-life driving data.
  type: Behavior prediction
