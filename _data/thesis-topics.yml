  description: In this project you will investigate a custom precise GNSS localization solution. The solution can, for instance, be based on using smartphones as a base station and mobile units. The base station would know it’s precise location and would communicate the localization error that it is experiencing to the mobile units and thus allow the mobile units to correct their localization estimates.
