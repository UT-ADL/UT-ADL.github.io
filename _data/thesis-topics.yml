- title: A unified object detection model in birds-eye-view using public datasets
  description: "This thesis project thus aims to leverage from the advancements made by the Computer Vision community in using Neural networks on Image data. The idea is to project lidar data into a birds eye view (BEV) image and use segmentation models such as <a href='https://towardsdatascience.com/understanding-semantic-segmentation-with-unet-6be4f42d4b47'>Unet</a> to segment out objects of interest. You will be required to collect all open source perception data sets (eg, <a href='https://www.cvlibs.net/datasets/kitti/eval_object.php?obj_benchmark=bev'>KITTI</a>, <a href='https://www.nuscenes.org/nuscenes'>NuSCENES</a>, <a href='https://waymo.com/open/'>WAYMO</a>, <a href='https://level-5.global/data/'>LYFT</a> etc) for self driving and unify them into a single format that can be used to train segmentation models. You will be validating the performance of those models and will also be able to test high performing models on the lab's vehicle, in real driving scenarios."
