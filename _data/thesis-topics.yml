- title: "Fallback to lane following in case of GNSS failure"
  description: "Using Global Navigation Satellite Systems (GNSS) is one of the primary sources used for localization (positioning). Knowing your precise current position is essential in map-based trajectory following. Sometimes GNSS localization can be not accurate enough or just fail. Such events cannot be allowed in fully autonomous driving, so there must be some fallback to rely on in such cases. This project aims to develop a fallback method to mitigate GNSS failures. One simple option is to continue with lane following until the GNSS regains its accuracy or stop safely when GNSS localization is lost completely. The goal of this project is to develop a method for fusing map-based and lane-following trajectories."
