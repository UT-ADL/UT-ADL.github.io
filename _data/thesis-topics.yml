- title: Precise GNSS localization
  description: Global Navigation Satellite Systems (GNSS) such as Galileo, GPS etc. suffer from errors caused by atmospheric conditions (and a variety of other factors). Some techniques for enhancing GNSS-localization accuracy (such as D-GPS and RTK etc.) work on the principle that if a base station (the exact location of which is known) is experiencing a specific error in localization because of the atmospheric conditions, then other GNSS devices in the vicinity must be experiencing the same error. In this project you will investigate a custom precise GNSS localization solution. The solution can, for instance, be based on using smartphones as a base station and mobile units. The base station would know it’s precise location and would communicate the localization error that it is experiencing to the mobile units and thus allow the mobile units to correct their localization estimates.
  type: Localization
