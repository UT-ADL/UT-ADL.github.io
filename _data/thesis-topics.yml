- title: Openbot for autonomous driving research
  description: One of the main hurdles in entering autonomous driving education and research is the cost and complexity of life-size autonomous driving systems. At the same time, open-source and low-cost robots have gotten significant attention in recent years, one example being the Openbot (<a href='https://www.openbot.org/home' target='_blank'>https://www.openbot.org/home</a>). In this project you will investigate Openbot as a platform for use in autonomous driving education and research. You have the possibility of investigating different aspects of autonomous driving such as localization, motion prediction, end-to-end navigation etc. using the platform in this project.
