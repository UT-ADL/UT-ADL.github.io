- title: "Convert real-world spatial data into a usable format"
  description: "There are several open-source software stacks available in autonomous driving and often they need different map formats. Autonomous Driving Lab is interested in testing and validating different approaches to autonomous driving, and hence we need to be able to generate maps in different formats. At the same time when the map data is gathered this format information and relations between the features are not there, because they might be coming from different pipelines (manual digitizing, machine learning model, some other algorithm). Creating these relations manually is time-consuming and prone to errors. The aim of this topic is to create the relations (different formats need different relations) for the map data automatically. As an example, we could imagine mapped traffic lights, but they need to be associated with the right lanes or centerline trajectory needs to know which is its right and left edge, and is there a right or left lane, is there a branching at the end of the lane, etc. One of the possible formats, the map data needs to be transformed to, is <a href='https://www.asam.net/standards/detail/opendrive/'>ASAM OpenDrive</a>."
