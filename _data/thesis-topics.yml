- title: Flow sensing for applications in autonomous driving
  description: "The usual sensing modalities that are available to autonomous vehicles i.e. vision, radar and lidar have their limitations. For example, none of them is very suitable for estimating the length of a leading vehicle. Additional sensing modalities, such as wind flow sensing, might have the potential to meaningfully complement the usual sensing modalities in autonomous driving. You will build upon the innovative work done on flow-sensing applications in autonomous driving by Roman Matvejev and Matis Ottan (thesis links below). There are multiple directions that can be investigated. For example, (i) working in simulations and proposing new applications of flow sensing in autonomous driving, (ii) investigating new feature extraction and classification/regression methods etc. or (iii) expanding out of simulations with physical validation of flow sensing in autonomous driving. Roman and Matis’ theses can be accessed at the following links: <a href='https://comserv.cs.ut.ee/ati_thesis/datasheet.php?id=71873&year=2021' target='_blank'>https://comserv.cs.ut.ee/ati_thesis/datasheet.php?id=71873&year=2021</a> <a href='https://comserv.cs.ut.ee/ati_thesis/datasheet.php?id=74510&year=2022' target='_blank'>https://comserv.cs.ut.ee/ati_thesis/datasheet.php?id=74510&year=2022</a>"
