- title: "Understanding city characteristics through clustering analysis"
  description: "Operating in 100+ cities and 40+ countries includes a lot of complexity for reporting and ML applications. To reduce this complexity we can cluster the cities based on map, traffic, and/or business data and describe their characteristics through prototypical examples, so called “exemplars”. The immense advantage of exemplars lies in understanding business wide dynamics on a handful of examples and generalising their characteristics to other members of the same cluster.<br><br>In this topic you will get the opportunity to handle geospatial data in a real business context. You will use different clustering techniques and evaluate their cluster quality. By serving “cluster exemplars” you will understand different city characteristics and their impact on our business. Your analysis has the potential to impact the entire reporting and modelling at Bolt."
  type: Bolt
  availability:
    BSc: no
    MSc: yes
    PhD: no
  leads:
    - name: Sophie Laturnus
      email: sophie.laturnus@bolt.eu
