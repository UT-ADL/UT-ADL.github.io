- title: "Localization using SfM point cloud"
  description: "Localization using point cloud is quite commonly used in autonomous driving. Usually, the source point cloud is collected by a lidar sensor using RTK GNSS positioning and applying a lot of filtering on top of it to remove dynamic objects and achieve good geometric quality. In this topic, it is proposed that a point cloud map is composed using the camera images and Structure from Motion process and the points are actually image features (descriptors). The localization can now be performed using:
lidar - then the point cloud might need to be additionally processed to make it more suitable for accurate localization (densification, some other filtering);
camera images - every image will have its own descriptors that need to be matched with the point cloud. Extra information (car odometry, visual odometry from images) could be used to improve the accuracy. The challenge here is to build a real-time localization capability."
  type: Localization
