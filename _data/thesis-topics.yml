- title: Donkey Car platform for autonomous driving research
  description: "In this project you will study what aspects of autonomous driving are well suited to be studied using small-scale vehicles. And what aspects aren’t. The investigation includes the areas such as mapping and localization, behaviour prediction, end-to-end driving, control, safety, comfort, planning etc. And then: either investigate one of these areas further using the donkey car platform; or design a small-scale “city” with donkey cars as the test platform to be used in autonomous-driving research."
