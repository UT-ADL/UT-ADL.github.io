- title: Review and comparison of 2D/3D tracking methods for self driving cars
  description: "In this research, you will investigate available literature on object tracking in both 2D (images) and 3D from the perspective of an autonomous vehicle. You will review state-of-the-art tracking methodologies, categorize them and discuss their performance factors. As an example, you can read multi-object tracking fundamentals for autonomous driving in this thesis: <a href='https://repository.tudelft.nl/islandora/object/uuid%3Af536b829-42ae-41d5-968d-13bbaa4ec736'>https://repository.tudelft.nl/islandora/object/uuid%3Af536b829-42ae-41d5-968d-13bbaa4ec736</a>"
