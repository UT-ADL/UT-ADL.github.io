  description: "<a href='https://arxiv.org/abs/2001.08361'>Scaling laws</a> have completely transformed the NLP field, making it possible to have models like <a href='https://en.wikipedia.org/wiki/GPT-3'>GPT-3</a> that generate human-level text. We would like to develop a similar kind of scaling laws for end-to-end driving. In this project you will train a number of models of different sizes on different sizes of datasets collected from CARLA simulation. The end result is a simple model that represents the dependency between dataset size, model size and model performance in CARLA Leaderboard."
