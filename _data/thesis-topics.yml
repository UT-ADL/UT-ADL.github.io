- title: Vehicle motion prediction at a roundabout
  description: As human drivers we instinctively predict the motion of other road agents, be it manually driven vehicles, pedestrians and cyclists etc. This however is not a trivial task for an autonomous vehicle. In this project you will investigate and then integrate a vehicle motion prediction technique on a real autonomous vehicle. For this you will be working on an existing open source software stack like <a href='https://www.autoware.org/' target='_blank'>https://www.autoware.org/</a> and integrate an existing baseline pattern-based motion prediction model for vehicles that can be used by the motion planners. Autoware uses a third-party motion planner i.e. OpenPlanner. For testing you will be focusing on a roundabout scenario. You can choose any other autonomy stack and planner to work with but this should be agreed first. 
  type: Behavior prediction
  availability: 
