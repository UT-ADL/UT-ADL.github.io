- title: "Better positioning using smartphones"
  description: "The positioning accuracy of an average mobile phone is 2-5 meters. To use mobile phones as dashcams for mapping, better location accuracy is desirable. This can be achieved by recording GNSS raw data and postprocessing it later together with additional info about the atmospheric conditions at that moment and precise satellite locations. This can be done with <a href='https://developer.android.com/guide/topics/sensors/gnss'>newer Android phones</a>. This project aims to investigate these methods, taking hints from <a href='https://www.kaggle.com/c/google-smartphone-decimeter-challenge/'>Google Smartphone Decimeter Challenge</a> and <a href='https://github.com/commaai/laika'>comma.ai laika</a> projects."
