- title: "Efficient intervention with uplift models"
  description: "Uplift model is a trending technique to estimate the effect of an intervention at an individual or segment level. It enables machine learning models to provide reasonable answers to relevant business questions around product features, campaigns, and recommendation offers.<br><br>In this research topic you will implement state-of-the-art uplift models and evaluate their application in feature personalisation for customers."
  type: Bolt
  availability:
    BSc: no
    MSc: yes
    PhD: no
  leads:
