- title: "Map real-life features necessary for autonomous driving"
  description: "Different approaches to autonomous driving exist, but solutions that have gone further to date use HD maps. HD maps have very good spatial accuracy and gather lane-level information about different features necessary for autonomous driving. This topic aims to develop pipelines for the automatic mapping of these features. Necessary features could be traffic lights, traffic signs, road markings, wayarea, etc. Different sensor data (camera images, lidar point cloud, car odometry, GNSS localization) and methods (detect features using Yolo or other neural networks, 3D point cloud processing, 3D image reconstruction, triangulation, image segmentation) could be used."
