- title: "Always valid p-values for experiment monitoring"
  description: 'In this research topic you will implement and evaluate methods for always-valid inference of metrics in an AB experiment. This technique is useful to provide data teams with relevant metrics during an experiment execution without increasing the false positive rate from "peeking" results.'
  type: Bolt
