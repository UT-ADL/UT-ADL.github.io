- title: Anomaly detection in pedestrian motion along the streets and at crosswalks
  description: As human drivers we instinctively predict the motion of other road agents, be it manually driven vehicles, pedestrians and cyclists etc. This includes detecting/recognising any anomalous behaviour in other agents, for example a pedestrian who is about to jump on the road without being at a crosswalk, or a pedestrian who is standing by a crosswalk but doesn’t intend to cross the road. Such detection of anomalous behaviour is not a trivial task for an autonomous vehicle. In this project you will investigate and implement such anomalous behaviour techniques for autonomous driving applications. You can use any current non-trivial baseline solution and test it using an open-source Autonomous Driving simulator compliant with the Autoware platform, based on Robotic Operating System (ROS). Successful implementation of the working algorithm in the simulator environment can lead to further integration and testing using an actual vehicle with autonomous driving capabilities and a full sensor suite.
  type: Behavior prediction
  availability: 
