- title: "Solving Vehicle Routing Problem with Constraints for quick grocery delivery"
  description: "Attended home delivery and same-day delivery have been studied extensively in the past. In recent years however, quick and rapid grocery delivery have changed the way people in cities order their food. This in turn have created novel problems for companies trying to optimize their delivery routing. In this project, we are interested in how does the introduction of 15 minute delivery option in addition to longer delivery options changes the optimal routing solution. The main part of the project concerns solving the vehicle routing problem with time windows with additional considerations such as including stochastic demand, stochastic travel times or joint pricing optimization."
  type: Bolt
  availability:
    BSc: no
    MSc: yes
    PhD: no
  leads:
