---
layout: blog
title: Blog
permalink: /blog
meta: An overview of the Autonomous Driving Lab blog
---

<div class="mb-12">
	<div class="menu-tags" data-filter-group="lang" data-filter-target="#blog-list">
		<a class="menu-link active" data-filter-value="all" href="#">All posts</a>
		<a class="menu-link" data-filter-value="en" href="#">Only in English</a>
	</div>

	<div id="blog-list">
		{% for post in site.posts %}
		<div class="filter-item news-card-filter" data-filter-lang="{{ post.language }}">
			<div class="grid grid-cols-12 gap-4 my-6 news-card" id="news">
				<a class="card-anchor-absolute" href="{{ post.url }}" style="z-index:1000"></a>
				<div class="md:col-span-3">
					<img alt="{{ post.alt }}" src="{{ post.image }}" style="max-width: 100%">
				</div>
				<div class="md:col-span-9 mb-2">
					<div class="news-card-body mt-4">
						<h6>{{ post.title }}</h6>
						<span class="overlane-text">NEWS &bull; {{ post.date | date: "%m/%d/%Y" }}</span>
					</div>
				</div>
			</div>
			<hr />
		</div>
		{% endfor %}
	</div>
</div>
